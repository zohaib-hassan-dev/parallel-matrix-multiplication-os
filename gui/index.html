<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Matrix Multiply GUI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Matrix Multiply — Live GUI</h1>
        <div id="stats">
            <div>Status: <span id="status">idle</span></div>
            <div>Rows Completed: <span id="rows">0</span> / <span id="total">?</span></div>
        </div>
        <div id="progressbar">
            <div id="progress"></div>
        </div>
        <div style="margin-top:10px;">
            <button id="refreshBtn">Refresh Now</button>
        </div>
        <h2>Result (preview)</h2>
        <div id="matrixPreview">No result yet</div>
    </div>
    <script src="app.js"></script>
</body>

</html>
